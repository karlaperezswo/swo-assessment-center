AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Single-table DynamoDB store for swo-assessment-center v2.
  Holds Organizations, Users, Memberships, Sessions, Assessments,
  Opportunities, Documents, Agent threads, API keys and Audit logs.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment suffix appended to the table name.

  TableBaseName:
    Type: String
    Default: swo-assessments
    Description: Logical base name for the single table.

  EnableDeletionProtection:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Protect prod/staging from accidental deletion.

  PointInTimeRecovery:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable PITR for the table (recommended for staging/prod).

Conditions:
  IsDeletionProtected: !Equals [!Ref EnableDeletionProtection, "true"]
  IsPitrEnabled: !Equals [!Ref PointInTimeRecovery, "true"]

Resources:
  SwoAssessmentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${TableBaseName}-${EnvName}"
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: !If [IsDeletionProtected, true, false]
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsPitrEnabled, true, false]
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: swo-assessment-center
        - Key: Env
          Value: !Ref EnvName
        - Key: Owner
          Value: platform

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref SwoAssessmentsTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt SwoAssessmentsTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

  TableStreamArn:
    Description: Stream ARN (empty until streams enabled)
    Value: "none"
