AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Secrets Manager entries for swo-assessment-center v2. Replaces plain
  env-vars / .env.production for sensitive values. Lambda reads these at
  cold start via getSecretValue (cache for the duration of the container).

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  KmsKeyArn:
    Type: String
    Description: ARN of the CMK from kms-stack.yaml (for encryption).

Resources:
  CognitoClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "swo-assessment/${EnvName}/cognito-client"
      Description: Cognito app client secret (if using confidential client in future).
      KmsKeyId: !Ref KmsKeyArn

  BedrockCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "swo-assessment/${EnvName}/bedrock-api"
      Description: Optional Bedrock API credentials (when not using IAM role).
      KmsKeyId: !Ref KmsKeyArn

  ScraperSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "swo-assessment/${EnvName}/scraper"
      Description: Tokens/API keys for AWS docs scraping (if any).
      KmsKeyId: !Ref KmsKeyArn

Outputs:
  CognitoClientSecretArn:
    Value: !Ref CognitoClientSecret
  BedrockCredentialsArn:
    Value: !Ref BedrockCredentials
  ScraperSecretsArn:
    Value: !Ref ScraperSecrets
