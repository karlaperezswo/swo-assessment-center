AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS WAFv2 WebACL for swo-assessment-center v2. Managed rules + per-IP
  rate limit. Attach to the API Gateway stage in a companion step:
    aws wafv2 associate-web-acl --web-acl-arn <arn> --resource-arn <apigw-stage-arn>

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  RatePer5MinutesPerIp:
    Type: Number
    Default: 2000
    Description: WAF rate limit (requests per 5 minutes per source IP).

Resources:
  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "swo-assessment-${EnvName}"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "swo-assessment-${EnvName}"
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: common-rule-set
            SampledRequestsEnabled: true
        - Name: AWSManagedKnownBadInputs
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: known-bad-inputs
            SampledRequestsEnabled: true
        - Name: AWSManagedSqli
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: sqli
            SampledRequestsEnabled: true
        - Name: RateLimitPerIp
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref RatePer5MinutesPerIp
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: rate-limit-per-ip
            SampledRequestsEnabled: true

Outputs:
  WebAclArn:
    Value: !GetAtt WebAcl.Arn
    Export:
      Name: !Sub "${AWS::StackName}-WebAclArn"
  WebAclId:
    Value: !Ref WebAcl
